name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run tests
        run: GOWORK=off go test ./...
      - name: Build binary
        run: GOWORK=off go build ./...
      - name: Smoke local action
        uses: ./
        with:
          script: ./examples/trivial.js
          cwd: .
          json-result: "true"
